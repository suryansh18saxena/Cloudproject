<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CloudLabX — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #06080f; --bg2: #0b1120; --surface: #111827; --surface2: #1a2438;
            --primary: #7dd3fc; --primary-dim: #38bdf8; --primary-glow: rgba(125,211,252,0.15);
            --accent: #c084fc; --accent2: #f472b6;
            --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #64748b;
            --border: rgba(125,211,252,0.08); --glass2: rgba(26,36,56,0.65);
            --red: #ef4444; --green: #22c55e;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .aurora { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
        .aurora-blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: .12; animation: auroraFloat 20s ease-in-out infinite; }
        .aurora-blob:nth-child(1) { width: 600px; height: 600px; background: var(--primary); top: -10%; left: 20%; }
        .aurora-blob:nth-child(2) { width: 500px; height: 500px; background: var(--accent); top: 40%; right: -5%; animation-delay: -7s; }
        .aurora-blob:nth-child(3) { width: 450px; height: 450px; background: var(--accent2); bottom: -10%; left: 10%; animation-delay: -14s; }
        @keyframes auroraFloat {
            0%, 100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(60px,-40px) scale(1.1); }
            66% { transform: translate(-30px,50px) scale(.9); }
        }
        .auth-container {
            position: relative; z-index: 1; width: 100%; max-width: 480px; padding: 1rem;
        }
        .auth-card {
            background: var(--glass2); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 24px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,.5);
        }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand h1 {
            font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand p { color: var(--text-dim); font-size: .9rem; margin-top: .3rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block; font-size: .8rem; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: .4rem;
        }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 1rem; color: var(--text-muted); font-size: .9rem; }
        .input-wrapper input {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: .75rem 1rem .75rem 2.8rem;
            font-size: .9rem; color: var(--text); outline: none; transition: all .3s;
            font-family: 'Inter', sans-serif;
        }
        .input-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
        .input-wrapper input::placeholder { color: var(--text-muted); }
        .btn-submit {
            width: 100%; padding: .85rem; border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dim));
            color: var(--bg); font-size: .95rem; font-weight: 700; cursor: pointer;
            transition: all .3s; margin-top: .5rem;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--primary-glow); }
        .auth-footer {
            text-align: center; margin-top: 1.5rem; font-size: .85rem; color: var(--text-dim);
        }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 600; transition: opacity .3s; }
        .auth-footer a:hover { opacity: .7; }
        .alert {
            padding: .7rem 1rem; border-radius: 10px; font-size: .82rem; margin-bottom: 1rem;
            display: flex; align-items: center; gap: .5rem;
        }
        .alert-error { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.15); }
        .alert-success { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.15); }
    </style>
</head>
<body>
    <div class="aurora">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="brand">
                <h1>CloudLabX</h1>
                <p>Create your account — start learning cloud</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'signup' %}">
                {% csrf_token %}
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" name="first_name" placeholder="First name" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" name="last_name" placeholder="Last name" />
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-at"></i>
                        <input type="text" name="username" placeholder="Choose a username" required autofocus />
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="Your email address" required />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="password" placeholder="Min 6 characters" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="confirm_password" placeholder="Re-enter" required />
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-rocket"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="{% url 'login' %}">Log In</a>
            </div>
        </div>
    </div>
</body>
</html>
